name: Feature Request
description: Propose a new capability or enhancement
labels: [enhancement]
body:
  - type: input
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: I cannot configure per-project command allowlists
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your preferred implementation and UX
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What should be true when this is done?
      placeholder: |
        - New config key is documented
        - Validation and tests are added
        - Backward compatibility is preserved
