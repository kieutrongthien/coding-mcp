name: Bug Report
description: Report a reproducible defect
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: read_file returns incorrect line range
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Include exact commands or MCP calls
      placeholder: |
        1. Start server with ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and Error Output
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, package version/commit
      placeholder: Ubuntu 24.04, Node 20.11, commit abc123
    validations:
      required: true
