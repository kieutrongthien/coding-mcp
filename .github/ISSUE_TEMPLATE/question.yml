name: Question
description: Ask for usage or design guidance
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include config, commands, and relevant snippets (no secrets)
