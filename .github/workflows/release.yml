name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack npm tarball
        run: npm pack

      - name: Generate release notes from commit prefixes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-creatordate | grep -Fxv "$current_tag" | head -n 1 || true)"

          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          mapfile -t commits < <(git log "$range" --pretty=format:'%H%x09%s')

          whats_new=()
          whats_changed=()
          declare -A seen_subjects=()
          prefix_regex='^(feat|enhancement|breaking-change)(\([^)]*\))?(!)?:[[:space:]]+'
          repo_url="https://github.com/${GITHUB_REPOSITORY}"

          for commit_line in "${commits[@]}"; do
            sha="${commit_line%%$'\t'*}"
            subject="${commit_line#*$'\t'}"
            [[ -z "$subject" ]] && continue
            [[ "$sha" == "$commit_line" ]] && continue
            if [[ -n "${seen_subjects[$subject]:-}" ]]; then
              continue
            fi
            seen_subjects[$subject]=1
            entry="$subject ${repo_url}/commit/${sha}"

            if [[ "$subject" =~ $prefix_regex ]]; then
              whats_new+=("$entry")
            else
              whats_changed+=("$entry")
            fi
          done

          {
            echo "### What's new"
            if [[ ${#whats_new[@]} -eq 0 ]]; then
              echo "- No entries"
            else
              for line in "${whats_new[@]}"; do
                echo "- $line"
              done
            fi

            echo
            echo "### What's changed"
            if [[ ${#whats_changed[@]} -eq 0 ]]; then
              echo "- No entries"
            else
              for line in "${whats_changed[@]}"; do
                echo "- $line"
              done
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            *.tgz
